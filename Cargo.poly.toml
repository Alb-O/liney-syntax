[workspace]
members = ["crates/*"]
resolver = "3"

[workspace.package]
edition = "2024"
version = "0.1.0"
license = "MPL-2.0"

[workspace.dependencies]
arc-swap = true
cc = true
regex = true
regex-cursor = true
ropey = true
slab = true
thiserror = true
tracing = true
tree-sitter = { package = "tree-house-bindings" }
